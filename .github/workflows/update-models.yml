name: Update AI Model Data

on:
  schedule:
    - cron: "30 19 * * *"
  workflow_dispatch:

jobs:
  update-models:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --prefix scripts-data

      - name: Run fetch script
        run: node scripts-data/fetch-models.js | tee fetch-models.log

      - name: Commit updated models
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add artifacts/ai-model-directory/public/data/models.json
          git diff --staged --quiet || git commit -m "chore: update models.json [$(date -u +'%Y-%m-%d')]"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
