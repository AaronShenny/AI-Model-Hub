<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI Model Directory</title>
    <script>
      // GitHub Pages SPA routing: store the current path and redirect to index.html
      sessionStorage.setItem("spa_redirect", window.location.href);
      window.location.replace(
        window.location.origin +
          window.location.pathname.split("/").slice(0, 2).join("/") +
          "/"
      );
    </script>
  </head>
  <body></body>
</html>
