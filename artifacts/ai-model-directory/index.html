<html lang="en">

    <meta charset="UTF-8" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="AI Model Hub" />
    <meta property="og:description" content="Compare top AI models by capability, context window, and pricing in one searchable open-source hub." />

    <meta property="og:image" content="/opengraph.jpg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AI Model Hub" />
    <meta name="twitter:description" content="Search and compare leading AI models across providers in seconds." />
    <meta name="twitter:image" content="/opengraph.jpg" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Prevent flash of unstyled content for dark mode -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("aidir_theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (stored === "dark" || (!stored && prefersDark)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
    <!-- GitHub Pages SPA routing: restore path from redirect -->
    <script>
      (function () {
        var redirect = sessionStorage.getItem("spa_redirect");
        if (redirect) {
          sessionStorage.removeItem("spa_redirect");
          var url = new URL(redirect, window.location.origin);
          window.history.replaceState(null, "", url.pathname + url.search + url.hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
