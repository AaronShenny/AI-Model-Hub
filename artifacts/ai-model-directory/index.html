<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>AI Model Directory</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Prevent flash of unstyled content for dark mode -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("aidir_theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (stored === "dark" || (!stored && prefersDark)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
    <!-- GitHub Pages SPA routing: restore path from redirect -->
    <script>
      (function () {
        var redirect = sessionStorage.getItem("spa_redirect");
        if (redirect) {
          sessionStorage.removeItem("spa_redirect");
          var url = new URL(redirect, window.location.origin);
          window.history.replaceState(null, "", url.pathname + url.search + url.hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
